<!DOCTYPE html>
<html>
<head>
    <title>Payment</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(-45deg, #020024, #090979, #00d4ff, #001f3f);
            background-size: 400% 400%;
            animation: bgMove 10s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes bgMove {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        /* 💎 CARD */
        .card {
            width: 380px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 15px;
        }

        .amount {
            font-size: 22px;
            color: #00ffcc;
            margin-bottom: 20px;
        }

        .qr-box {
            padding: 15px;
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            display: inline-block;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .qr-box img {
            width: 220px;
        }

        button {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(90deg, #00d4ff, #00ffcc);
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #00d4ff;
        }

        .note {
            margin-top: 15px;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
        }

    </style>
</head>

<body>

<div class="card">

    <h1>💳 Secure Payment</h1>

    <div class="amount">
        ₹{{ amount }}
    </div>

    <p style="color:white; margin-bottom:10px;">Scan QR to Pay</p>

    <div class="qr-box">
        <img src="{{ url_for('static', filename='images/qr.png') }}">
    </div>

    <form method="POST">
        <button type="submit">I Have Paid 🚀</button>
    </form>

    <div class="note">
        * Payment will be verified by admin
    </div>

</div>

</body>
</html>
