<!DOCTYPE html>
<html>
<head>
    <title>Booking</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(-45deg, #020024, #090979, #00d4ff, #001f3f);
            background-size: 400% 400%;
            animation: bgMove 10s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes bgMove {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        /* 💎 CARD */
        .card {
            width: 400px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 15px;
        }

        .offers {
            margin: 15px 0;
            color: #00ffcc;
            font-size: 14px;
        }

        .stats {
            margin: 15px 0;
            color: white;
            font-size: 14px;
        }

        .error {
            margin-top: 12px;
            color: #ffd2d2;
            font-size: 13px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            margin-top: 15px;
            background: rgba(255,255,255,0.15);
            color: white;
        }

        input::placeholder {
            color: rgba(255,255,255,0.6);
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(90deg, #00d4ff, #00ffcc);
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #00d4ff;
        }

    </style>
</head>

<body>

<div class="card">

    <h1>🎟️ Yacht Tickets</h1>

    <div class="offers">
        <p>🎯 6 Tickets → 10% OFF</p>
        <p>🔥 7+ Tickets → 15% OFF</p>
    </div>

    <div class="stats">
        <p>Available: {{ available }}</p>
        <p>Sold: {{ sold }}</p>
    </div>

    {% if db_error %}
        <p class="error">Booking is temporarily unavailable. Please try again in a few minutes.</p>
    {% endif %}

    <form method="POST">
        <input type="number" name="tickets" min="1" max="{{ available }}" placeholder="Enter number of tickets" required {% if db_error or available == 0 %}disabled{% endif %}>

        <button type="submit" {% if db_error or available == 0 %}disabled{% endif %}>Continue 🚀</button>
    </form>

</div>

</body>
</html>
