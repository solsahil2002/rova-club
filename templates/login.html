<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(-45deg, #020024, #090979, #00d4ff, #001f3f);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 🌊 Animated Gradient */
        @keyframes gradientBG {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        /* 🫧 Bubbles */
        .bubble {
            position: absolute;
            bottom: -100px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            animation: rise 10s infinite ease-in;
        }

        @keyframes rise {
            0% {
                transform: translateY(0) scale(0.5);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translateY(-1000px) scale(1);
                opacity: 0;
            }
        }

        /* 💎 Glass Card */
        .card {
            backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.08);
            padding: 40px;
            border-radius: 20px;
            width: 320px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }

        h2 {
            color: white;
            margin-bottom: 20px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 14px;
        }

        input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #00d4ff, #00ffcc);
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #00d4ff;
        }

    </style>
</head>
<body>

    <!-- 🫧 Bubbles -->
    <div class="bubble" style="width:40px;height:40px;left:10%;animation-duration:8s;"></div>
    <div class="bubble" style="width:20px;height:20px;left:20%;animation-duration:6s;"></div>
    <div class="bubble" style="width:60px;height:60px;left:70%;animation-duration:10s;"></div>
    <div class="bubble" style="width:30px;height:30px;left:50%;animation-duration:7s;"></div>

    <!-- 💎 LOGIN CARD -->
    <div class="card">
        <h2>🌊 Yacht Login</h2>

        <form method="POST">
            <input type="email" name="email" placeholder="Enter your email" required>
            <button type="submit">Send OTP 🚀</button>
        </form>
    </div>

</body>
</html>
